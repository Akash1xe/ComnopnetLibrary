services:
  api:
    build:
      context: .
      target: runtime
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file:
      - .env
    deploy:
      replicas: 3
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      - postgres
      - redis
    networks:
      - backend_net

  postgres:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.5
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend_net

  celery_worker:
    build:
      context: .
      target: runtime
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      - redis
      - postgres
    networks:
      - backend_net

  celery_beat:
    build:
      context: .
      target: runtime
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      - redis
    networks:
      - backend_net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    mem_limit: 256m
    cpus: 0.5
    networks:
      - backend_net

volumes:
  postgres_data:
  redis_data:

networks:
  backend_net:
    driver: bridge
